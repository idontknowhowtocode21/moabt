<!DOCTYPE html>
<html>
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>E-Book Reader</title>
    <style>
        body, html { margin: 0; padding: 0; height: 100%; overflow: hidden; background: #1a1a1a; }
        #wrapper { width: 100%; height: 100%; overflow-y: scroll; -webkit-overflow-scrolling: touch; }
        iframe { width: 100%; height: 10000px; border: none; } /* Huge height to force scroll */
    </style>
</head>
<body>
    <div id="wrapper">
        <iframe src="https://docs.google.com/viewer?url=https://ia902903.us.archive.org/12/items/FantasyFictionebookcollection/Harry%20Potter/4%20-%20Harry%20Potter%20and%20the%20Goblet%20of%20Fire.pdf&embedded=true"></iframe>
    </div>

    <script src="https://js.pusher.com/8.0.1/pusher.min.js"></script>
    <script src="script.js"></script>
</body>
</html>
